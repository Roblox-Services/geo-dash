<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini Geometry Dash</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:#111;
  font-family:Arial;
}

canvas{
  display:block;
  margin:auto;
  background:#222;
}

#ui{
  position:absolute;
  top:10px;
  left:10px;
  color:white;
  font-size:20px;
}
</style>
</head>

<body>

<div id="ui">Score: <span id="score">0</span></div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = 900;
canvas.height = 400;

let player = {
  x:120,
  y:300,
  size:30,
  dy:0,
  gravity:0.7,
  jump:-12,
  grounded:false,
  rotation:0
};

let obstacles=[];
let frame=0;
let score=0;
let gameOver=false;

function spawnObstacle(){

  const type = Math.random() < 0.5 ? "spike":"block";

  obstacles.push({
    x:canvas.width,
    y: type==="spike" ? 330 : 300,
    w:30,
    h:30,
    type:type
  });

}

document.addEventListener("keydown",e=>{

  if(e.code==="Space" && player.grounded){
    player.dy = player.jump;
    player.grounded=false;
  }

  if(gameOver && e.code==="KeyR"){
    location.reload();
  }

});

function update(){

  if(gameOver) return;

  frame++;
  score++;

  if(frame % 100 ===0){
    spawnObstacle();
  }

  player.dy += player.gravity;
  player.y += player.dy;

  if(!player.grounded){
    player.rotation += 0.15;
  }

  if(player.y > 300){
    player.y=300;
    player.dy=0;
    player.grounded=true;
    player.rotation=0;
  }

  obstacles.forEach(o=>{
    o.x -=6;

    if(
      player.x < o.x + o.w &&
      player.x + player.size > o.x &&
      player.y < o.y + o.h &&
      player.y + player.size > o.y
    ){
      gameOver=true;
    }
  });

  obstacles = obstacles.filter(o=>o.x>-50);

  document.getElementById("score").textContent=score;
}

function drawPlayer(){

  ctx.save();

  ctx.translate(
    player.x + player.size/2,
    player.y + player.size/2
  );

  ctx.rotate(player.rotation);

  ctx.fillStyle="#0f0";

  ctx.fillRect(
    -player.size/2,
    -player.size/2,
    player.size,
    player.size
  );

  ctx.restore();
}

function drawObstacles(){

  obstacles.forEach(o=>{

    if(o.type==="block"){

      ctx.fillStyle="#f00";
      ctx.fillRect(o.x,o.y,o.w,o.h);

    }else if(o.type==="spike"){

      ctx.fillStyle="#ff5555";

      ctx.beginPath();
      ctx.moveTo(o.x, o.y+o.h);
      ctx.lineTo(o.x + o.w/2, o.y);
      ctx.lineTo(o.x + o.w, o.y+o.h);
      ctx.closePath();
      ctx.fill();

    }

  });

}

function draw(){

  ctx.clearRect(0,0,canvas.width,canvas.height);

  drawPlayer();
  drawObstacles();

  ctx.fillStyle="#888";
  ctx.fillRect(0,330,canvas.width,70);

  if(gameOver){

    ctx.fillStyle="white";
    ctx.font="40px Arial";
    ctx.fillText("Game Over",350,150);

    ctx.font="20px Arial";
    ctx.fillText("Press R to Restart",360,200);

  }

}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
