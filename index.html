<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Geometry Dash Browser</title>

<style>
body{
margin:0;
overflow:hidden;
background:#0f0f0f;
font-family:Arial;
}

canvas{
display:block;
margin:auto;
background:#1c1c1c;
}

#ui{
position:absolute;
top:10px;
left:10px;
color:white;
font-size:18px;
}
</style>
</head>

<body>

<div id="ui">
Score: <b id="score">0</b> |
High: <b id="high">0</b>
</div>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = 1000;
canvas.height = 400;

let gravityDirection = 1;

let player={
x:150,
y:300,
size:30,
dy:0,
gravity:0.7,
jump:-12,
grounded:false,
rotation:0
};

let particles=[];
let obstacles=[];
let frame=0;
let score=0;
let gameOver=false;

let highScore = localStorage.getItem("gd_high") || 0;
document.getElementById("high").textContent = highScore;

function playJumpSound(){

let audio = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
audio.volume=0.3;
audio.play();

}

function playDeathSound(){

let audio = new Audio("https://actions.google.com/sounds/v1/cartoon/concussive_drum_hit.ogg");
audio.volume=0.4;
audio.play();

}

function spawnParticles(x,y,color){

for(let i=0;i<12;i++){

particles.push({
x:x,
y:y,
vx:(Math.random()-0.5)*4,
vy:(Math.random()-1.5)*4,
life:40,
color:color
});

}

}

function spawnObstacle(){

let r = Math.random();
let type="spike";

if(r<0.3) type="spike";
else if(r<0.55) type="double";
else if(r<0.75) type="block";
else if(r<0.9) type="jumppad";
else type="portal";

obstacles.push({
x:canvas.width,
type:type,
width:30,
height:30,
y:300
});

}

function jump(){

if(player.grounded && !gameOver){

player.dy = player.jump * gravityDirection;
player.grounded=false;

spawnParticles(player.x+15,player.y+30,"#00ffcc");

playJumpSound();

}

}

document.addEventListener("keydown",e=>{

if(e.code==="Space") jump();

if(gameOver && e.code==="KeyR"){
location.reload();
}

});

canvas.addEventListener("touchstart",jump);

function update(){

if(gameOver){

updateParticles();
return;

}

frame++;
score++;

if(frame%110===0) spawnObstacle();

player.dy += player.gravity * gravityDirection;
player.y += player.dy;

if(!player.grounded){
player.rotation += 0.15 * gravityDirection;
}

if(gravityDirection===1){

if(player.y>300){
player.y=300;
player.dy=0;
player.grounded=true;
player.rotation=0;
}

}else{

if(player.y<0){
player.y=0;
player.dy=0;
player.grounded=true;
player.rotation=0;
}

}

obstacles.forEach(o=>{

o.x -=6;

if(o.type==="jumppad"){

if(
player.x < o.x+30 &&
player.x + player.size > o.x &&
player.y + player.size >=300 &&
player.y + player.size <=310
){
player.dy=-16*gravityDirection;
spawnParticles(player.x+15,player.y+30,"#00aaff");
}

}

if(o.type==="portal"){

if(
player.x < o.x+30 &&
player.x + player.size > o.x &&
player.y < o.y+30 &&
player.y + player.size > o.y
){
gravityDirection*=-1;
spawnParticles(player.x+15,player.y+15,"#bb55ff");
}

}

if(o.type==="spike"||o.type==="block"||o.type==="double"){

let width=o.type==="double"?60:30;

if(
player.x < o.x+width &&
player.x + player.size > o.x &&
player.y < o.y+30 &&
player.y + player.size > o.y
){

gameOver=true;
playDeathSound();
spawnParticles(player.x+15,player.y+15,"#ff4444");

}

}

});

obstacles = obstacles.filter(o=>o.x>-100);

updateParticles();

document.getElementById("score").textContent=score;

if(gameOver){

if(score>highScore){
localStorage.setItem("gd_high",score);
}

}

}

function updateParticles(){

particles.forEach(p=>{

p.x += p.vx;
p.y += p.vy;
p.life--;

});

particles = particles.filter(p=>p.life>0);

}

function drawParticles(){

particles.forEach(p=>{

ctx.fillStyle=p.color;
ctx.fillRect(p.x,p.y,4,4);

});

}

function drawCube(){

ctx.save();

ctx.translate(
player.x + player.size/2,
player.y + player.size/2
);

ctx.rotate(player.rotation);

ctx.fillStyle="#00ff88";

ctx.fillRect(
-player.size/2,
-player.size/2,
player.size,
player.size
);

ctx.restore();

}

function drawObstacle(o){

if(o.type==="block"){

ctx.fillStyle="#ff4444";
ctx.fillRect(o.x,300,30,30);

}

if(o.type==="spike"){

ctx.fillStyle="#ff6666";

ctx.beginPath();
ctx.moveTo(o.x,330);
ctx.lineTo(o.x+15,300);
ctx.lineTo(o.x+30,330);
ctx.fill();

}

if(o.type==="double"){

ctx.fillStyle="#ff6666";

ctx.beginPath();
ctx.moveTo(o.x,330);
ctx.lineTo(o.x+15,300);
ctx.lineTo(o.x+30,330);
ctx.fill();

ctx.beginPath();
ctx.moveTo(o.x+30,330);
ctx.lineTo(o.x+45,300);
ctx.lineTo(o.x+60,330);
ctx.fill();

}

if(o.type==="jumppad"){

ctx.fillStyle="#00aaff";
ctx.fillRect(o.x,320,30,10);

}

if(o.type==="portal"){

ctx.strokeStyle="#bb55ff";
ctx.lineWidth=4;

ctx.beginPath();
ctx.arc(o.x+15,315,15,0,Math.PI*2);
ctx.stroke();

}

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#777";
ctx.fillRect(0,330,canvas.width,70);

drawCube();

obstacles.forEach(drawObstacle);

drawParticles();

if(gameOver){

ctx.fillStyle="rgba(0,0,0,0.7)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";
ctx.font="50px Arial";
ctx.fillText("YOU DIED",380,150);

ctx.font="24px Arial";
ctx.fillText("Score: "+score,450,210);

ctx.fillText("Press R to Restart",400,260);

}

}

function loop(){

update();
draw();
requestAnimationFrame(loop);

}

loop();

</script>

</body>
</html>
